aid: turo
name: Turo
description: >-
  Turo is a San Francisco-headquartered peer-to-peer car sharing marketplace
  operating in the United States, Canada, the United Kingdom, France, and
  Australia. The platform lets vehicle owners (hosts) list their cars for
  rent and lets travelers (guests) book those vehicles directly through the
  Turo app or website, with Turo handling identity verification, insurance,
  protection plans, payments, and trust and safety on top of the host's
  inventory. The marketplace covers economy cars, SUVs, trucks, vans, exotic
  and classic vehicles, and EVs across more than 14,000 cities, and offers
  contactless Turo Go vehicles where supported. Turo's revenue model is a
  marketplace take-rate against each trip plus protection plan and ancillary
  fees, supported by an integrated host operations stack (calendar, pricing,
  messaging, and earnings) and a guest mobile and web booking experience.
  Turo does not currently expose a public developer API, SDK, or partner
  developer portal. The only third-party-facing surface was a now-deprecated
  ChatGPT plugin (chatgpt.turo.com) launched in 2023 and sunset alongside
  OpenAI's plugins program in 2024. Integrations with connected-car platforms
  such as Smartcar are negotiated directly rather than through self-serve
  developer onboarding, and Turo's public GitHub presence
  (github.com/turo, github.com/open-turo) is limited to internal engineering
  tooling, GitHub Actions, ESLint configs, and language-specific libraries
  rather than a public marketplace API.
